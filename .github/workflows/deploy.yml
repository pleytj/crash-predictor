name: Build and Deploy Crash Predictor

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"
    - cron: "15 13 * * *"
    - cron: "15 19 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crash radar script
        run: |
          python macro_crash_radar_v3.py --csv radar_log.csv --auto-report --auto-html-report --tee-report

      - name: Check that index.html exists
        run: |
          test -f reports/index.html

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4